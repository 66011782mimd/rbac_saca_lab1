<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Part Fastener Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f9ff; /* sky-50 พื้นหลังหลักสีฟ้าอ่อน/ขาว */
            color: #0f172a;
        }
        .canvas-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.08); /* เงาสีน้ำเงินอ่อน */
            border: 1px solid #bfdbfe; /* blue-200 */
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(37,99,235,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37,99,235,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .input-field {
            @apply w-full px-3 py-2 bg-slate-50 border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm text-slate-800 shadow-sm;
        }
        .label-text {
            @apply block text-xs font-bold text-blue-800 uppercase tracking-wider mb-1;
        }
    </style>
</head>

    <script>
        // ---------------------------------------------------------
        // 1. DATA DICTIONARY: แคตตาล็อกสินค้า 7 ประเภท

        const PRODUCT_CATALOG = [
            // Group 1: I-Bolt (Studs)
            {

                inputs: [

                    { id: 'L', label: 'ความยาวรวม (L1)', type: 'number', default: 400, color: 'text-blue-700' }
                ]
            },
            // Others
            {
                id: 'jbolt_std',
                name: '2. เจ-โบลท์ J-Bolt',
                inputs: [
                    { id: 'D', label: 'ขนาดแกน (D)', type: 'number', default: 25, color: 'text-blue-700' },
                    { id: 'Lt', label: 'ระยะเกลียว (Lt)', type: 'number', default: 100, color: 'text-blue-700' },

                    { id: 'L2', label: 'ความกว้างตะขอ (L2)', type: 'number', default: 120, color: 'text-blue-700' },
                    { id: 'L3', label: 'ความยาวปลายงอ (L3)', type: 'number', default: 100, color: 'text-blue-700' }
                ]
            },
            {

                name: '3. เจ-โบลท์ งองู J-Bolt (Snake)',
                inputs: [
                    { id: 'D', label: 'ขนาดแกน (D)', type: 'number', default: 30, color: 'text-blue-700' },
                    { id: 'Lt', label: 'ระยะเกลียว (Lt)', type: 'number', default: 90, color: 'text-blue-700' },
                    { id: 'L1', label: 'ช่วงตรง (L1)', type: 'number', default: 250, color: 'text-blue-700' },
                    { id: 'L2', label: 'ปลายงอ (L2)', type: 'number', default: 80, color: 'text-blue-700' },
                    { id: 'Angle', label: 'องศางอ (Angle)', type: 'range', min: 10, max: 170, default: 45, color: 'text-blue-700' }
                ]
            },
            {

                name: '4. แอล-โบลท์ L-Bolt',
                inputs: [
                    { id: 'D', label: 'ขนาดแกน (D)', type: 'number', default: 25, color: 'text-blue-700' },
                    { id: 'Lt', label: 'ระยะเกลียว (Lt)', type: 'number', default: 100, color: 'text-blue-700' },
                    { id: 'L1', label: 'ช่วงแกนหลัก (L1)', type: 'number', default: 300, color: 'text-blue-700' },
                    { id: 'L2', label: 'ช่วงฐานงอ (L2)', type: 'number', default: 120, color: 'text-blue-700' },
                    { id: 'R', label: 'รัศมีโค้งงอ (R)', type: 'number', default: 25, color: 'text-blue-700' }
                ]
            },
            {
                id: 'ubolt',
                name: '5. ยูโบลท์ U-Bolt',
                inputs: [
                    { id: 'D', label: 'ขนาดแกน (D)', type: 'number', default: 16, color: 'text-blue-700' },
                    { id: 'Lt', label: 'ระยะเกลียว (Lt)', type: 'number', default: 60, color: 'text-blue-700' },
                    { id: 'L1', label: 'ความยาวรวม (L1)', type: 'number', default: 200, color: 'text-blue-700' },
                    { id: 'L2', label: 'ระยะศูนย์กลาง (L2)', type: 'number', default: 100, color: 'text-blue-700' }
                ]
            },
            {
                id: 'ubolt_sq',
                name: '6. ยู-โบลท์เหลี่ยม U-Bolt Square',
                inputs: [
                    { id: 'D', label: 'ขนาดแกน (D)', type: 'number', default: 16, color: 'text-blue-700' },
                    { id: 'Lt', label: 'ระยะเกลียว (Lt)', type: 'number', default: 60, color: 'text-blue-700' },
                    { id: 'L1', label: 'ความยาวรวม (L1)', type: 'number', default: 200, color: 'text-blue-700' },
                    { id: 'L2', label: 'ระยะศูนย์กลาง (L2)', type: 'number', default: 100, color: 'text-blue-700' },
                    { id: 'R', label: 'รัศมีโค้งงอ (R)', type: 'number', default: 15, color: 'text-blue-700' }
                ]
            },
            // Group 7: Plate
            {
                id: 'plate_type1',
                group: '7. เพลท Plate',
                name: 'Type 1 (เจาะรู 4 มุม)',
                inputs: [
                    { id: 'L1', label: 'ความยาว (L1)', type: 'number', default: 150, color: 'text-blue-700' },
                    { id: 'L2', label: 'ความกว้าง (L2)', type: 'number', default: 150, color: 'text-blue-700' },
                    { id: 'T', label: 'ความหนา (T)', type: 'number', default: 9, color: 'text-blue-700' },
                    { id: 'HD', label: 'ขนาดรูเจาะ (HD)', type: 'number', default: 14, color: 'text-blue-700' },
                    { id: 'M', label: 'ระยะขอบ (M)', type: 'number', default: 20, color: 'text-blue-700' }
                ]
            },
            {
                id: 'plate_type2',
                group: '7. เพลท Plate',
                name: 'Type 2 (เพลททึบ ไม่มีรู)',
                inputs: [
                    { id: 'L1', label: 'ความยาว (L1)', type: 'number', default: 150, color: 'text-blue-700' },
                    { id: 'L2', label: 'ความกว้าง (L2)', type: 'number', default: 150, color: 'text-blue-700' },
                    { id: 'T', label: 'ความหนา (T)', type: 'number', default: 9, color: 'text-blue-700' }
                ]
            }
        ];

        // ---------------------------------------------------------
        // 2. DRAWING UTILITIES
        // ---------------------------------------------------------
        const Utils = {
            clearCanvas: (ctx, w, h) => {
                // เติมพื้นหลังด้วยสีขาวล้วน 100%
                ctx.fillStyle = '#ffffff'; 
                ctx.fillRect(0, 0, w, h);
            },
            drawDimLine: (ctx, x1, y1, x2, y2) => {
                ctx.strokeStyle = '#2563eb'; 
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();

                const angle = Math.atan2(y2 - y1, x2 - x1);
                const headlen = 10;
                const arrowAngle = Math.PI / 7;

                ctx.fillStyle = '#2563eb';
                
                // Arrow 1
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x1 + headlen * Math.cos(angle + arrowAngle), y1 + headlen * Math.sin(angle + arrowAngle));
                ctx.lineTo(x1 + headlen * Math.cos(angle - arrowAngle), y1 + headlen * Math.sin(angle - arrowAngle));
                ctx.closePath();
                ctx.fill();

                // Arrow 2
                ctx.beginPath();
                ctx.moveTo(x2, y2);
                ctx.lineTo(x2 - headlen * Math.cos(angle + arrowAngle), y2 - headlen * Math.sin(angle + arrowAngle));
                ctx.lineTo(x2 - headlen * Math.cos(angle - arrowAngle), y2 - headlen * Math.sin(angle - arrowAngle));
                ctx.closePath();
                ctx.fill();

                // Extension lines
                const cap = 8;
                ctx.beginPath();
                ctx.moveTo(x1 - cap*Math.sin(angle), y1 + cap*Math.cos(angle));
                ctx.lineTo(x1 + cap*Math.sin(angle), y1 - cap*Math.cos(angle));
                ctx.moveTo(x2 - cap*Math.sin(angle), y2 + cap*Math.cos(angle));
                ctx.lineTo(x2 + cap*Math.sin(angle), y2 - cap*Math.cos(angle));
                ctx.stroke();
            },
            drawBadge: (ctx, x, y, text, rot = 0) => {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rot);
                ctx.font = 'bold 14px Sarabun';
                
                const tw = ctx.measureText(text).width;
                const th = 14;
                const px = 10, py = 6;
                
                ctx.shadowColor = 'rgba(37, 99, 235, 0.2)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 3;

                ctx.fillStyle = '#eff6ff'; 
                ctx.beginPath();
                ctx.roundRect(-tw/2 - px, -th/2 - py, tw + px*2, th + py*2, 6);
                ctx.fill();
                
                ctx.strokeStyle = '#bfdbfe'; 
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.shadowColor = 'transparent';
                ctx.fillStyle = '#1d4ed8'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, 0, 1);
                ctx.restore();
            },
            drawThreads: (ctx, startX, startY, endX, endY, D) => {
                ctx.strokeStyle = '#94a3b8'; 
                ctx.lineWidth = Math.max(1, D * 0.1);
                ctx.lineCap = 'butt';
                
                let dist = Math.hypot(endX - startX, endY - startY);
                if(dist <= 0) return;
                let dx = (endX - startX) / dist;
                let dy = (endY - startY) / dist;
                let perpX = -dy * (D/2);
                let perpY = dx * (D/2);

                for (let i = 0; i < dist; i += (D*0.25)) {
                    let cx = startX + dx * i;
                    let cy = startY + dy * i;
                    ctx.beginPath();
                    ctx.moveTo(cx - perpX, cy - perpY);
                    ctx.lineTo(cx + perpX, cy + perpY);
                    ctx.stroke();
                }
            },
            // ฟังก์ชันวาดเส้นเกลียวสำหรับสตัดแนวนอน
            drawHorizontalThreads: (ctx, x1, x2, yTop, yBottom) => {
                ctx.strokeStyle = '#64748b'; 
                ctx.lineWidth = 1.2;
                if (x1 > x2) return;
                for (let x = x1; x <= x2; x += 4) {
                    ctx.beginPath();
                    ctx.moveTo(x, yTop);
                    ctx.lineTo(x, yBottom);
                    ctx.stroke();
                }
            }
        };

        const BODY_COLOR = '#334155'; 

        // ---------------------------------------------------------
        // 3. RENDERERS: ตรรกะการวาดรูปของสินค้าแต่ละชนิด
        // ---------------------------------------------------------
        const Renderers = {
            // 1.1 สตัดเกลียวข้างเดียว
            stud_1side: (ctx, v, w, h, d) => {
                const marginX = 240; // เพิ่ม Margin ให้รูปเล็กลง
                const scale = (w - marginX * 2) / d.L;
                const startX = marginX;
                const centerY = h/2;
                const endX = startX + d.L * scale;
                const halfD = (d.D * scale) / 2;

                // Outline
                ctx.strokeStyle = BODY_COLOR;
                ctx.lineWidth = 2;
                ctx.strokeRect(startX, centerY - halfD, d.L * scale, d.D * scale);

                // Threads
                Utils.drawHorizontalThreads(ctx, startX, startX + d.Lt*scale, centerY - halfD, centerY + halfD);

                // Dims
                const dimY_L = centerY + halfD + 40;
                Utils.drawDimLine(ctx, startX, dimY_L, endX, dimY_L);
                Utils.drawBadge(ctx, (startX+endX)/2, dimY_L + 25, `L1=${v.L}`);

                const dimY_Lt = centerY - halfD - 30;
                Utils.drawDimLine(ctx, startX, dimY_Lt, startX + d.Lt*scale, dimY_Lt);
                Utils.drawBadge(ctx, startX + (d.Lt*scale)/2, dimY_Lt - 25, `Lt=${v.Lt}`);

                Utils.drawDimLine(ctx, startX - 40, centerY - halfD, startX - 40, centerY + halfD);
                Utils.drawBadge(ctx, startX - 85, centerY, `D=${v.D}`);
            },

            // 1.2 สตัดเกลียว 2 ข้าง
            stud_2side: (ctx, v, w, h, d) => {
                const marginX = 240;
                const scale = (w - marginX * 2) / d.L;
                const startX = marginX;
                const centerY = h/2;
                const endX = startX + d.L * scale;
                const halfD = (d.D * scale) / 2;

                // Outline
                ctx.strokeStyle = BODY_COLOR;
                ctx.lineWidth = 2;
                ctx.strokeRect(startX, centerY - halfD, d.L * scale, d.D * scale);

                // Threads
                Utils.drawHorizontalThreads(ctx, startX, startX + d.Lt*scale, centerY - halfD, centerY + halfD);
                Utils.drawHorizontalThreads(ctx, endX - d.Lt1*scale, endX, centerY - halfD, centerY + halfD);

                // Dims
                const dimY_L = centerY + halfD + 40;
                Utils.drawDimLine(ctx, startX, dimY_L, endX, dimY_L);
                Utils.drawBadge(ctx, (startX+endX)/2, dimY_L + 25, `L1=${v.L}`);

                const dimY_Lt = centerY - halfD - 30;
                Utils.drawDimLine(ctx, startX, dimY_Lt, startX + d.Lt*scale, dimY_Lt);
                Utils.drawBadge(ctx, startX + (d.Lt*scale)/2, dimY_Lt - 25, `Lt=${v.Lt}`);

                Utils.drawDimLine(ctx, endX - d.Lt1*scale, dimY_Lt, endX, dimY_Lt);
                Utils.drawBadge(ctx, endX - (d.Lt1*scale)/2, dimY_Lt - 25, `Lt1=${v.Lt1}`);

                Utils.drawDimLine(ctx, startX - 40, centerY - halfD, startX - 40, centerY + halfD);
                Utils.drawBadge(ctx, startX - 85, centerY, `D=${v.D}`);
            },

            // 1.3 สตัดเกลียวตลอด
            stud_full: (ctx, v, w, h, d) => {
                const marginX = 240;
                const scale = (w - marginX * 2) / d.L;
                const startX = marginX;
                const centerY = h/2;
                const endX = startX + d.L * scale;
                const halfD = (d.D * scale) / 2;

                ctx.strokeStyle = BODY_COLOR;
                ctx.lineWidth = 2;
                ctx.strokeRect(startX, centerY - halfD, d.L * scale, d.D * scale);

                Utils.drawHorizontalThreads(ctx, startX, endX, centerY - halfD, centerY + halfD);

                const dimY_L = centerY + halfD + 40;
                Utils.drawDimLine(ctx, startX, dimY_L, endX, dimY_L);
                Utils.drawBadge(ctx, (startX+endX)/2, dimY_L + 25, `L1=${v.L}`);

                Utils.drawDimLine(ctx, startX - 40, centerY - halfD, startX - 40, centerY + halfD);
                Utils.drawBadge(ctx, startX - 85, centerY, `D=${v.D}`);
            },

            // 1.4 สตัดปากฉลาม
            stud_shark: (ctx, v, w, h, d) => {
                const marginX = 240;
                const scale = (w - marginX * 2) / d.L;
                const startX = marginX;
                const centerY = h/2;
                const endX = startX + d.L * scale;
                const halfD = (d.D * scale) / 2;

                // Path for angled cut (tip at bottom right)
                const cutX = endX - (d.D * scale);
                ctx.strokeStyle = BODY_COLOR;
                ctx.lineWidth = 2;
                
                // Outline
                ctx.beginPath();
                ctx.moveTo(startX, centerY - halfD);
                ctx.lineTo(cutX, centerY - halfD);
                ctx.lineTo(endX, centerY + halfD);
                ctx.lineTo(startX, centerY + halfD);
                ctx.closePath();
                ctx.stroke();

                // Vertical line at cut start
                ctx.beginPath();
                ctx.moveTo(cutX, centerY - halfD);
                ctx.lineTo(cutX, centerY + halfD);
                ctx.stroke();

                // Clip and draw threads across the whole length
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(startX, centerY - halfD);
                ctx.lineTo(cutX, centerY - halfD);
                ctx.lineTo(endX, centerY + halfD);
                ctx.lineTo(startX, centerY + halfD);
                ctx.closePath();
                ctx.clip();
                Utils.drawHorizontalThreads(ctx, startX, endX, centerY - halfD, centerY + halfD);
                ctx.restore();

                const dimY_L = centerY + halfD + 40;
                Utils.drawDimLine(ctx, startX, dimY_L, endX, dimY_L);
                Utils.drawBadge(ctx, (startX+endX)/2, dimY_L + 25, `L1=${v.L}`);

                Utils.drawDimLine(ctx, startX - 40, centerY - halfD, startX - 40, centerY + halfD);
                Utils.drawBadge(ctx, startX - 85, centerY, `D=${v.D}`);
            },

            // 1.5 สตัดปลายสกัด
            stud_chisel: (ctx, v, w, h, d) => {
                const marginX = 240;
                const scale = (w - marginX * 2) / d.L;
                const startX = marginX;
                const centerY = h/2;
                const endX = startX + d.L * scale;
                const halfD = (d.D * scale) / 2;

                // Path for chisel point (tip at center right)
                const cutStartX = endX - (d.D * scale * 0.8); 
                ctx.strokeStyle = BODY_COLOR;
                ctx.lineWidth = 2;

                // Outline
                ctx.beginPath();
                ctx.moveTo(startX, centerY - halfD);
                ctx.lineTo(cutStartX, centerY - halfD);
                ctx.lineTo(endX, centerY);
                ctx.lineTo(cutStartX, centerY + halfD);
                ctx.lineTo(startX, centerY + halfD);
                ctx.closePath();
                ctx.stroke();

                // Vertical line at cut start
                ctx.beginPath();
                ctx.moveTo(cutStartX, centerY - halfD);
                ctx.lineTo(cutStartX, centerY + halfD);
                ctx.stroke();

                // Clip and draw threads across the whole length
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(startX, centerY - halfD);
                ctx.lineTo(cutStartX, centerY - halfD);
                ctx.lineTo(endX, centerY);
                ctx.lineTo(cutStartX, centerY + halfD);
                ctx.lineTo(startX, centerY + halfD);
                ctx.closePath();
                ctx.clip();
                Utils.drawHorizontalThreads(ctx, startX, endX, centerY - halfD, centerY + halfD);
                ctx.restore();

                const dimY_L = centerY + halfD + 40;
                Utils.drawDimLine(ctx, startX, dimY_L, endX, dimY_L);
                Utils.drawBadge(ctx, (startX+endX)/2, dimY_L + 25, `L1=${v.L}`);

                Utils.drawDimLine(ctx, startX - 40, centerY - halfD, startX - 40, centerY + halfD);
                Utils.drawBadge(ctx, startX - 85, centerY, `D=${v.D}`);
            },

            // 2. J-Bolt Standard
            jbolt_std: (ctx, v, w, h, d) => {
                const margin = 240; // เพิ่มระยะขอบให้รูปเล็กลง
                const scale = (h - margin * 2) / d.L1;
                
                // Ensure R is valid (L2 must be > D)
                const minL2 = d.D * 1.5;
                const safeL2 = Math.max(d.L2, minL2);
                
                // Calculate Center-to-Center radius based on Outer Width L2
                const R_draw = (safeL2 * scale - d.D * scale) / 2;
                
                const L1_draw = d.L1 * scale;
                const L3_draw = d.L3 * scale;
                const halfD = (d.D * scale) / 2;

                // startX is center of the left shaft
                const startX = w/2 - R_draw;
                const startY = margin;
                
                // arcCenterY is the center-point for bottom half-circle
                const arcCenterY = startY + L1_draw - halfD - R_draw;
                const hookX = startX + 2 * R_draw;
                // hookTipY based on L3 outer height from bottom outer edge
                const hookTipY = startY + L1_draw - L3_draw;
                
                ctx.strokeStyle = BODY_COLOR;
                ctx.lineWidth = d.D * scale;
                ctx.lineCap = 'butt';
                
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(startX, arcCenterY);
                ctx.arc(startX + R_draw, arcCenterY, R_draw, Math.PI, 0, true);
                ctx.lineTo(hookX, hookTipY);
                ctx.stroke();

                // Threads
                Utils.drawThreads(ctx, startX, startY, startX, startY + d.Lt * scale, d.D*scale);

                // --- Dimensions ---
                const outerBottomY = startY + L1_draw;

                // D (Top Width)
                Utils.drawDimLine(ctx, startX - halfD, startY - 30, startX + halfD, startY - 30);
                Utils.drawBadge(ctx, startX, startY - 55, `D=${v.D}`);

                // L1 (Total Left Outer Length)
                const dimX_L1 = startX - halfD - 60;
                Utils.drawDimLine(ctx, dimX_L1, startY, dimX_L1, outerBottomY);
                Utils.drawBadge(ctx, dimX_L1 - 45, startY + L1_draw/2, `L1=${v.L1}`);

                // Lt (Thread Length)
                const dimX_Lt = startX + halfD + 40;
                Utils.drawDimLine(ctx, dimX_Lt, startY, dimX_Lt, startY + d.Lt*scale);
                Utils.drawBadge(ctx, dimX_Lt + 45, startY + (d.Lt*scale)/2, `Lt=${v.Lt}`);

                // L2 (Total Outer Width)
                const dimY_L2 = outerBottomY + 40;
                Utils.drawDimLine(ctx, startX - halfD, dimY_L2, hookX + halfD, dimY_L2);
                Utils.drawBadge(ctx, startX + R_draw, dimY_L2 + 25, `L2=${v.L2}`);

                // L3 (Hook Outer Height)
                const dimX_L3 = hookX + halfD + 60;
                Utils.drawDimLine(ctx, dimX_L3, hookTipY, dimX_L3, outerBottomY);
                Utils.drawBadge(ctx, dimX_L3 + 45, hookTipY + (outerBottomY - hookTipY)/2, `L3=${v.L3}`);
            },

            // 3. J-Bolt งองู
            jbolt_angled: (ctx, v, w, h, d) => {
                const margin = 240; // เพิ่มระยะขอบให้รูปเล็กลง
                const angleRad = d.Angle * Math.PI / 180;
                const drawH = d.L1 + (Math.abs(d.L2 * Math.cos(angleRad)));
                const scale = (h - margin * 2) / drawH;

                const startX = w / 2 - 40;
                const startY = margin;
                const bendY = startY + d.L1 * scale;
                const hookX = startX + d.L2 * scale * Math.sin(angleRad);
                const hookY = bendY - d.L2 * scale * Math.cos(angleRad);

                ctx.strokeStyle = BODY_COLOR;
                ctx.lineWidth = d.D * scale;
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                
                let bendRadius = Math.min(d.D * scale * 1.0, Math.min(d.L1 * scale, d.L2 * scale) * 0.8 * Math.tan(angleRad / 2));
                ctx.arcTo(startX, bendY, hookX, hookY, bendRadius);
                ctx.lineTo(hookX, hookY);
                ctx.stroke();

                Utils.drawThreads(ctx, startX, startY+5, startX, startY + d.Lt * scale, d.D*scale);

                const l1X = startX - (d.D*scale/2) - 60;
                Utils.drawDimLine(ctx, l1X, startY, l1X, bendY);
                Utils.drawBadge(ctx, l1X - 45, startY + (d.L1*scale)/2, `L1=${v.L1}`);

                const ltX = startX + (d.D*scale/2) + 60;
                Utils.drawDimLine(ctx, ltX, startY, ltX, startY + d.Lt*scale);
                Utils.drawBadge(ctx, ltX + 45, startY + (d.Lt*scale)/2, `Lt=${v.Lt}`);

                const offset = (d.D*scale/2) + 30;
                const lineAngle = Math.atan2(hookY - bendY, hookX - startX);
                const offX = offset * Math.cos(lineAngle + Math.PI/2);
                const offY = offset * Math.sin(lineAngle + Math.PI/2);
                Utils.drawDimLine(ctx, startX+offX, bendY+offY, hookX+offX, hookY+offY);
                
                const badgeOffX = (offset + 35) * Math.cos(lineAngle + Math.PI/2);
                const badgeOffY = (offset + 35) * Math.sin(lineAngle + Math.PI/2);
                Utils.drawBadge(ctx, (startX+hookX)/2 + badgeOffX, (bendY+hookY)/2 + badgeOffY, `L2=${v.L2}`, lineAngle);
                
                Utils.drawDimLine(ctx, startX - (d.D*scale/2), startY - 30, startX + (d.D*scale/2), startY - 30);
                Utils.drawBadge(ctx, startX, startY - 55, `M${v.D}`);
            },

            // 4. L-Bolt
            lbolt: (ctx, v, w, h, d) => {
                const marginTop = 260; // เพิ่มให้รูปเล็กลง 30%
                const marginBottom = 220; 
                const scale = (h - marginTop - marginBottom) / d.L1;
                
                const D_draw = d.D * scale;
                const L1_draw = d.L1 * scale;
                const L2_draw = d.L2 * scale;
                const R_draw = d.R * scale;
                const Lt_draw = d.Lt * scale;

                // Ensure horizontal base is long enough to draw the bend
                const safeL2_draw = Math.max(L2_draw, D_draw + R_draw);

                const startX = w / 2 - safeL2_draw / 2;
                const startY = marginTop;
                
                // Calculate pivot point for inner arc
                const strokeR = R_draw + D_draw / 2;
                const arcCenterY = startY + L1_draw - R_draw - D_draw;
                const arcCenterX = startX + strokeR;
                const endX = startX - D_draw / 2 + safeL2_draw;

                // Draw solid body with flat ends
                ctx.strokeStyle = BODY_COLOR;
                ctx.lineWidth = D_draw;
                ctx.lineCap = 'butt'; 
                ctx.lineJoin = 'miter';
                
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(startX, arcCenterY);
                // Draw bottom-right curve counter-clockwise from left (PI) to bottom (PI/2)
                ctx.arc(arcCenterX, arcCenterY, strokeR, Math.PI, Math.PI / 2, true);
                ctx.lineTo(endX, arcCenterY + strokeR);
                ctx.stroke();

                // Threads
                Utils.drawThreads(ctx, startX, startY, startX, startY + Lt_draw, D_draw);

                // Dimensions
                const dimX_L1 = startX - D_draw / 2 - 60;
                Utils.drawDimLine(ctx, dimX_L1, startY, dimX_L1, startY + L1_draw);
                Utils.drawBadge(ctx, dimX_L1 - 45, startY + L1_draw / 2, `L1=${v.L1}`);

                const dimY_L2 = startY + L1_draw + 40;
                Utils.drawDimLine(ctx, startX - D_draw / 2, dimY_L2, endX, dimY_L2);
                Utils.drawBadge(ctx, (startX - D_draw / 2 + endX) / 2, dimY_L2 + 25, `L2=${v.L2}`);

                const dimX_Lt = startX + D_draw / 2 + 40;
                Utils.drawDimLine(ctx, dimX_Lt, startY, dimX_Lt, startY + Lt_draw);
                Utils.drawBadge(ctx, dimX_Lt + 45, startY + Lt_draw / 2, `Lt=${v.Lt}`);
                
                Utils.drawDimLine(ctx, startX - D_draw / 2, startY - 30, startX + D_draw / 2, startY - 30);
                Utils.drawBadge(ctx, startX, startY - 55, `D=${v.D}`);

                // Inner Radius Badge (R)
                Utils.drawBadge(ctx, arcCenterX + 25, arcCenterY + 15, `R=${v.R}`);
            },

            // 5. U-Bolt
            ubolt: (ctx, v, w, h, d) => {
                const marginTop = 260; // ปรับลดขนาดโดยรวม
                const marginBottom = 220;
                const marginX = 240;
                const scale = Math.min((h - marginTop - marginBottom) / d.L1, (w - marginX * 2) / d.L2);
                
                const D_draw = d.D * scale;
                const L1_draw = d.L1 * scale;
                const L2_draw = d.L2 * scale;
                const Lt_draw = d.Lt * scale;

                const centerX = w / 2;
                const startY = marginTop;
                
                const leftX = centerX - L2_draw / 2;
                const rightX = centerX + L2_draw / 2;
                
                const arcRadius = L2_draw / 2;
                const outerRadius = arcRadius + D_draw / 2;
                const arcCenterY = startY + L1_draw - outerRadius;

                ctx.strokeStyle = BODY_COLOR;
                ctx.lineWidth = D_draw;
                ctx.lineCap = 'butt';
                
                ctx.beginPath();
                ctx.moveTo(leftX, startY);
                ctx.lineTo(leftX, arcCenterY);
                ctx.arc(centerX, arcCenterY, arcRadius, Math.PI, 0, true);
                ctx.lineTo(rightX, startY);
                ctx.stroke();

                Utils.drawThreads(ctx, leftX, startY, leftX, startY + Lt_draw, D_draw);
                Utils.drawThreads(ctx, rightX, startY, rightX, startY + Lt_draw, D_draw);

                const outerBottomY = startY + L1_draw;

                // D (Top Left Width)
                Utils.drawDimLine(ctx, leftX - D_draw/2, startY - 30, leftX + D_draw/2, startY - 30);
                Utils.drawBadge(ctx, leftX, startY - 55, `D=${v.D}`);

                // L2 (Center-to-Center)
                Utils.drawDimLine(ctx, leftX, startY - 80, rightX, startY - 80);
                Utils.drawBadge(ctx, centerX, startY - 105, `L2=${v.L2}`);

                // L1 (Total Length)
                const dimX_L1 = leftX - D_draw/2 - 60;
                Utils.drawDimLine(ctx, dimX_L1, startY, dimX_L1, outerBottomY);
                Utils.drawBadge(ctx, dimX_L1 - 45, startY + L1_draw/2, `L1=${v.L1}`);

                // Lt (Thread Length)
                const dimX_Lt = rightX + D_draw/2 + 60;
                Utils.drawDimLine(ctx, dimX_Lt, startY, dimX_Lt, startY + Lt_draw);
                Utils.drawBadge(ctx, dimX_Lt + 45, startY + Lt_draw/2, `Lt=${v.Lt}`);
                
                // W (Inner width / Pipe Dia)
                const wY = arcCenterY; 
                const innerLeft = leftX + D_draw/2;
                const innerRight = rightX - D_draw/2;
                const innerGap_draw = L2_draw - D_draw;
                
                if(innerGap_draw > 20) {
                    Utils.drawDimLine(ctx, innerLeft, wY, innerRight, wY);
                    const wVal = (v.L2 - v.D).toFixed(1).replace(/\.0$/, ''); 
                    Utils.drawBadge(ctx, centerX, wY - 25, `W=${wVal}`);
                }
            },

            // 6. U-Bolt Square (ยู-โบลท์เหลี่ยม)
            ubolt_sq: (ctx, v, w, h, d) => {
                const marginTop = 260; // ปรับลดขนาดโดยรวม
                const marginBottom = 220;
                const marginX = 240;
                const scale = Math.min((h - marginTop - marginBottom) / d.L1, (w - marginX * 2) / d.L2);
                
                const D_draw = d.D * scale;
                const L1_draw = d.L1 * scale;
                const L2_draw = d.L2 * scale;
                const Lt_draw = d.Lt * scale;
                const R_draw = d.R * scale;

                const centerX = w / 2;
                const startY = marginTop;
                
                const leftX = centerX - L2_draw / 2;
                const rightX = centerX + L2_draw / 2;
                const bottomY = startY + L1_draw - D_draw / 2;

                const safeStrokeR = Math.min(R_draw + D_draw/2, L2_draw / 2);

                ctx.strokeStyle = BODY_COLOR;
                ctx.lineWidth = D_draw;
                ctx.lineCap = 'butt'; 
                ctx.lineJoin = 'round';
                
                ctx.beginPath();
                ctx.moveTo(leftX, startY);
                ctx.lineTo(leftX, bottomY - safeStrokeR);
                ctx.arcTo(leftX, bottomY, leftX + safeStrokeR, bottomY, safeStrokeR);
                ctx.lineTo(rightX - safeStrokeR, bottomY);
                ctx.arcTo(rightX, bottomY, rightX, bottomY - safeStrokeR, safeStrokeR);
                ctx.lineTo(rightX, startY);
                ctx.stroke();

                Utils.drawThreads(ctx, leftX, startY, leftX, startY + Lt_draw, D_draw);
                Utils.drawThreads(ctx, rightX, startY, rightX, startY + Lt_draw, D_draw);

                const outerBottomY = startY + L1_draw;

                // D (Top Left Width)
                Utils.drawDimLine(ctx, leftX - D_draw/2, startY - 30, leftX + D_draw/2, startY - 30);
                Utils.drawBadge(ctx, leftX, startY - 55, `D=${v.D}`);

                // L2 (Center-to-Center)
                Utils.drawDimLine(ctx, leftX, startY - 80, rightX, startY - 80);
                Utils.drawBadge(ctx, centerX, startY - 110, `L2=${v.L2}`);

                // L1 (Total Length)
                const dimX_L1 = leftX - D_draw/2 - 60;
                Utils.drawDimLine(ctx, dimX_L1, startY, dimX_L1, outerBottomY);
                Utils.drawBadge(ctx, dimX_L1 - 45, startY + L1_draw/2, `L1=${v.L1}`);

                // Lt (Thread Length)
                const dimX_Lt = rightX + D_draw/2 + 60;
                Utils.drawDimLine(ctx, dimX_Lt, startY, dimX_Lt, startY + Lt_draw);
                Utils.drawBadge(ctx, dimX_Lt + 45, startY + Lt_draw/2, `Lt=${v.Lt}`);

                // R (Radius Badge)
                Utils.drawBadge(ctx, rightX + D_draw/2 + 40, bottomY - safeStrokeR/2, `R=${v.R}`);
            },

            // 7.1 Plate Type 1 (เจาะรู 4 มุม)
            plate_type1: (ctx, v, w, h, d) => {
                const margin = 220;
                const maxDim = Math.max(d.L1, d.L2);
                const scale = (Math.min(w, h) - margin * 2) / maxDim;
                
                const pW = d.L2 * scale; // กว้าง L2
                const pL = d.L1 * scale; // ยาว L1
                const startX = (w - pW) / 2;
                const startY = (h - pL) / 2;

                ctx.fillStyle = '#f8fafc'; 
                ctx.strokeStyle = BODY_COLOR;
                ctx.lineWidth = 3;
                ctx.fillRect(startX, startY, pW, pL);
                ctx.strokeRect(startX, startY, pW, pL);

                const holeR = (d.HD * scale) / 2;
                const inset = d.M * scale; 
                
                const holes = [
                    {x: startX + inset, y: startY + inset},
                    {x: startX + pW - inset, y: startY + inset},
                    {x: startX + inset, y: startY + pL - inset},
                    {x: startX + pW - inset, y: startY + pL - inset}
                ];
                
                holes.forEach(pos => {
                    // วาดวงกลม (รู)
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, holeR, 0, Math.PI*2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.strokeStyle = BODY_COLOR; // กลับมาใช้สีเทาเข้ม
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    
                    // Crosshairs (กากบาท)
                    ctx.beginPath();
                    ctx.moveTo(pos.x - holeR - 10, pos.y); ctx.lineTo(pos.x + holeR + 10, pos.y);
                    ctx.moveTo(pos.x, pos.y - holeR - 10); ctx.lineTo(pos.x, pos.y + holeR + 10);
                    ctx.strokeStyle = '#94a3b8'; // ใช้สีเทาอ่อนแค่เส้นกากบาท
                    ctx.lineWidth = 1;
                    ctx.stroke();
                });

                // L1 (ซ้าย)
                Utils.drawDimLine(ctx, startX - 40, startY, startX - 40, startY + pL);
                Utils.drawBadge(ctx, startX - 40 - 32, startY + pL/2, `L1=${v.L1}`);

                // L2 (ล่าง)
                Utils.drawDimLine(ctx, startX, startY + pL + 40, startX + pW, startY + pL + 40);
                Utils.drawBadge(ctx, startX + pW/2, startY + pL + 40 + 25, `L2=${v.L2}`);

                // M (ระยะขอบรูเจาะ - บนขวา)
                Utils.drawDimLine(ctx, startX + pW - inset, startY - 30, startX + pW, startY - 30);
                Utils.drawBadge(ctx, startX + pW - inset/2, startY - 30 - 25, `M=${v.M}`);
                
                Utils.drawDimLine(ctx, startX + pW + 30, startY, startX + pW + 30, startY + inset);
                Utils.drawBadge(ctx, startX + pW + 30 + 35, startY + inset/2, `M=${v.M}`);

                Utils.drawBadge(ctx, startX + pW/2, startY + pL/2, `หนา(T)=${v.T} | รู(HD)=${v.HD}`);
            },

            // 7.2 Plate Type 2 (เพลททึบ ไม่มีรู)
            plate_type2: (ctx, v, w, h, d) => {
                const margin = 220;
                const maxDim = Math.max(d.L1, d.L2);
                const scale = (Math.min(w, h) - margin * 2) / maxDim;
                
                const pW = d.L2 * scale; // กว้าง L2
                const pL = d.L1 * scale; // ยาว L1
                const startX = (w - pW) / 2;
                const startY = (h - pL) / 2;

                ctx.fillStyle = '#f8fafc'; 
                ctx.strokeStyle = BODY_COLOR;
                ctx.lineWidth = 3;
                ctx.fillRect(startX, startY, pW, pL);
                ctx.strokeRect(startX, startY, pW, pL);

                // L1 (ซ้าย)
                Utils.drawDimLine(ctx, startX - 40, startY, startX - 40, startY + pL);
                Utils.drawBadge(ctx, startX - 40 - 32, startY + pL/2, `L1=${v.L1}`);

                // L2 (ล่าง)
                Utils.drawDimLine(ctx, startX, startY + pL + 40, startX + pW, startY + pL + 40);
                Utils.drawBadge(ctx, startX + pW/2, startY + pL + 40 + 25, `L2=${v.L2}`);

                Utils.drawBadge(ctx, startX + pW/2, startY + pL/2, `หนา(T)=${v.T}`);
            }
        };

        // ---------------------------------------------------------
        // 4. APP STATE & CONTROLLER
        // ---------------------------------------------------------
        const App = {
            state: {
                selectedId: PRODUCT_CATALOG[0].id,
                values: {} 
            },

            init: function() {
                this.renderSelector();
                this.selectProduct(this.state.selectedId);
            },

            renderSelector: function() {
                const select = document.getElementById('productSelect');
                select.innerHTML = '';
                
                let currentGroup = null;
                let parentNode = select;

                PRODUCT_CATALOG.forEach((prod) => {
                    if (prod.group) {
                        if (currentGroup !== prod.group) {
                            currentGroup = prod.group;
                            const optgroup = document.createElement('optgroup');
                            optgroup.label = currentGroup;
                            select.appendChild(optgroup);
                            parentNode = optgroup;
                        }
                    } else {
                        currentGroup = null;
                        parentNode = select;
                    }
                    
                    const option = document.createElement('option');
                    option.value = prod.id;
                    option.innerText = prod.name;
                    if (prod.id === this.state.selectedId) {
                        option.selected = true;
                    }
                    parentNode.appendChild(option);
                });
            },

            selectProduct: function(id) {
                this.state.selectedId = id;
                document.getElementById('productSelect').value = id;

                const product = PRODUCT_CATALOG.find(p => p.id === id);
                document.getElementById('currentTypeLabel').innerText = product.name;
                
                this.state.values = {};
                product.inputs.forEach(inp => {
                    this.state.values[inp.id] = inp.default;
                });

                this.renderForm(product);
                this.drawCanvas();
            },

            renderForm: function(product) {
                const container = document.getElementById('formContainer');
                container.innerHTML = '';

                product.inputs.forEach(inp => {
                    const wrapper = document.createElement('div');
                    
                    const label = document.createElement('label');
                    label.className = `label-text ${inp.color || 'text-blue-800'}`;
                    label.innerText = inp.label;
                    wrapper.appendChild(label);

                    if (inp.type === 'range') {
                        const flexWrap = document.createElement('div');
                        flexWrap.className = 'flex items-center gap-2';
                        
                        const slider = document.createElement('input');
                        slider.type = 'range';
                        slider.min = inp.min; slider.max = inp.max;
                        slider.value = this.state.values[inp.id];
                        slider.className = 'w-full accent-blue-600';

                        const numInput = document.createElement('input');
                        numInput.type = 'number';
                        numInput.value = this.state.values[inp.id];
                        numInput.className = 'input-field w-20 text-center font-bold text-blue-700';

                        slider.oninput = (e) => { numInput.value = e.target.value; this.updateValue(inp.id, parseFloat(e.target.value)); };
                        numInput.oninput = (e) => { slider.value = e.target.value; this.updateValue(inp.id, parseFloat(e.target.value)); };

                        flexWrap.appendChild(slider);
                        flexWrap.appendChild(numInput);
                        wrapper.appendChild(flexWrap);
                    } else {
                        const input = document.createElement('input');
                        input.type = 'number';
                        input.value = this.state.values[inp.id];
                        input.className = 'input-field';
                        input.oninput = (e) => this.updateValue(inp.id, parseFloat(e.target.value));
                        wrapper.appendChild(input);
                    }
                    
                    container.appendChild(wrapper);
                });
            },

            updateValue: function(key, val) {
                if(!isNaN(val)) {
                    this.state.values[key] = val;
                    this.drawCanvas();
                }
            },

            drawCanvas: function() {
                const canvas = document.getElementById('drawingCanvas');
                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;
                const product = PRODUCT_CATALOG.find(p => p.id === this.state.selectedId);

                // ดึงค่า Default ของชิ้นงานมาเป็นแกนวาดรูป (Fixed Shape) เพื่อไม่ให้รูปวาดขยับเมื่อตัวเลขเปลี่ยน
                const drawV = {};
                product.inputs.forEach(inp => {
                    drawV[inp.id] = inp.default;
                });

                Utils.clearCanvas(ctx, w, h); // ใช้ fillRect เติมพื้นหลังสีขาว

                if(Renderers[product.id]) {
                    // ส่งค่า drawV ไปสร้างรูปทรง และ v (this.state.values) ไปสร้างป้ายตัวหนังสือ
                    Renderers[product.id](ctx, this.state.values, w, h, drawV);
                } else {
                    ctx.fillStyle = 'red';
                    ctx.fillText('Renderer not found for: ' + product.id, w/2, h/2);
                }
            },

            downloadImage: function() {
                const canvas = document.getElementById('drawingCanvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                const w = canvas.width;
                const h = canvas.height;
                
                // ดึงข้อมูลพิกเซลทั้งหมดมาตรวจสอบ
                const imgData = ctx.getImageData(0, 0, w, h).data;
                
                let top = h, bottom = 0, left = w, right = 0;
                let hasContent = false;

                // สแกนหาขอบเขตของรูปวาด โดยละเว้นสีขาว 100% และเมินเงาจางๆ ที่หลุดออกไปไกล
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const i = (y * w + x) * 4;
                        // เงื่อนไข: ถ้าพิกเซลนั้น "เข้มกว่า 250" (ไม่ใช่สีขาว หรือเทาอ่อนจางๆ จาก anti-alias ขอบเงา)
                        if (imgData[i] < 250 && imgData[i+1] < 250 && imgData[i+2] < 250) {
                            hasContent = true;
                            if (y < top) top = y;
                            if (y > bottom) bottom = y;
                            if (x < left) left = x;
                            if (x > right) right = x;
                        }
                    }
                }

                let exportCanvas = canvas;
                
                // ถ้ารูปมีเนื้อหา ให้ทำการ Crop ขอบสีขาวทิ้ง (ลด padding เหลือ 10)
                if (hasContent) {
                    const padding = 10; // ตัดขอบให้ชิดมากๆ เหลือพื้นที่หายใจแค่ 10px
                    const cropW = right - left + 1;
                    const cropH = bottom - top + 1;
                    
                    exportCanvas = document.createElement('canvas');
                    exportCanvas.width = cropW + (padding * 2);
                    exportCanvas.height = cropH + (padding * 2);
                    const exCtx = exportCanvas.getContext('2d');
                    
                    // เติมพื้นหลังสีขาวล้วน
                    exCtx.fillStyle = '#ffffff';
                    exCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
                    
                    // วางรูปลงไปตรงกลางแบบที่ถูกตัดแล้ว
                    exCtx.drawImage(canvas, left, top, cropW, cropH, padding, padding, cropW, cropH);
                }

                const product = PRODUCT_CATALOG.find(p => p.id === this.state.selectedId);
                const sizeStr = this.state.values.D ? `-M${this.state.values.D}` : '';
                const link = document.createElement('a');
                link.download = `Generate-${product.id}${sizeStr}.png`;
                link.href = exportCanvas.toDataURL("image/png");
                link.click();
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
